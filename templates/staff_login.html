<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Shelf - Staff Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f8fafc] min-h-screen flex flex-col items-center justify-center p-4 antialiased text-[#334155]">

    <a href="{{ url_for('role_selection') }}" class="absolute top-8 left-8 flex items-center text-[13px] font-medium text-[#64748b] hover:text-[#0f172a] transition-colors">
        <svg class="w-3.5 h-3.5 mr-1.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
        </svg>
        Back to role selection
    </a>

    <div class="text-center mb-6">
        <div class="inline-flex items-center justify-center w-14 h-14 rounded-xl text-white mb-3 shadow-sm bg-[#00a651]">
            <svg class="w-7 h-7" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
            </svg>
        </div>
        <h1 class="text-2xl font-bold tracking-tight text-[#0f172a]">Smart Shelf</h1>
        
        <div class="flex items-center justify-center mt-1.5 text-xs font-semibold text-[#64748b] gap-1">
            <svg class="w-3.5 h-3.5 text-[#00a651]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path>
            </svg>
            <span>Staff Login</span>
        </div>
    </div>

    <div class="bg-white p-8 rounded-xl border border-[#edf2f7] shadow-sm w-full max-w-[420px]">
        {% if error %}
        <div class="mb-4 p-2.5 rounded bg-red-50 text-xs font-medium text-red-600 border border-red-100 text-center">
            {{ error }}
        </div>
        {% endif %}

        <form action="{{ url_for('staff_login') }}" method="POST" class="space-y-4">
            <div>
                <label for="email" class="block text-xs font-bold text-[#334155] mb-2 tracking-wide">Email Address</label>
                <input type="email" id="email" name="email" required autocomplete="email" placeholder="staff@example.com"
                       class="w-full px-3 py-2.5 rounded-lg border border-[#cbd5e1] font-normal placeholder-[#94a3b8] text-sm focus:outline-none focus:border-[#00a651] transition-colors">
            </div>

            <div>
                <label for="password" class="block text-xs font-bold text-[#334155] mb-2 tracking-wide">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Enter your password"
                       class="w-full px-3 py-2.5 rounded-lg border border-[#cbd5e1] font-normal placeholder-[#94a3b8] text-sm focus:outline-none focus:border-[#00a651] transition-colors">
            </div>

            <button type="submit" class="w-full text-white font-medium py-2.5 px-4 rounded-lg text-sm bg-[#00a651] hover:bg-[#008c44] transition-colors duration-150 mt-2">
                Login as Staff
            </button>

            <div class="text-center mt-3.5">
                <a href="#" class="text-xs font-medium text-[#00a651] hover:underline">Forgot password?</a>
            </div>
        </form>
    </div>

    <p class="text-[11px] font-medium text-[#94a3b8] mt-6">Demo credentials: Email: staff@smartshelf.com Password: staff123</p>

</body>
</html>
