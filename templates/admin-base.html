<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Smart Shelf{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/smartshelf.css') }}">
  <style>
  .brand p {
    color: #4f63f6 !important;
  }

  .nav a.active {
    background: #eef2ff !important;
    color: #4f63f6 !important;
  }

  .nav a.active .nav-icon {
    color: #4f63f6 !important;
    border-color: #4f63f6 !important;
  }

  .avatar {
    background: #4f63f6 !important;
    color: white !important;
  }

  .recommendation-box {
    background: #eef2ff;
    border: 1px solid #c7d2fe;
    color: #4f63f6;
  }
</style>
</head>

<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div>
        <div class="brand">
          <div class="logo">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Smart Shelf Logo">
          </div>
          <div>
            <h2>Smart Shelf</h2>
            <p>Admin Portal</p>
          </div>
        </div>

        <nav class="nav">
    <a class="{{ 'active' if active_page == 'dashboard' else '' }}"
       href="/admin-dashboard">
        <span class="nav-icon">D</span>
        Dashboard
    </a>

    <a class="{{ 'active' if active_page == 'inventory' else '' }}"
       href="/admin-inventory">
        <span class="nav-icon">I</span>
        Inventory
    </a>

    <a class="{{ 'active' if active_page == 'alerts' else '' }}"
       href="/admin-alerts">
        <span class="nav-icon">!</span>
        Alerts
    </a>

    <a href="{{ url_for('ai_predictions_page') }}" class="nav-link {% if active_page == 'ai_predictions' %}active{% endif %}">
    <span>AI Predictions</span>
    </a>
    
    <a class="{{ 'active' if active_page == 'record_sale' else '' }}" href="/admin-record-sale">
    <span class="nav-icon">S</span> Record Sale
</a>

</nav>
</div>
      <a class="logout" href="/logout">Logout</a>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="search">
          <span></span>
          <input type="search" placeholder="{% block search_placeholder %}Search inventory...{% endblock %}">
        </div>
        <div class="profile">
          <div>
            <h4>{{ profile_name|default('Admin') }}</h4>
            <p>{{ profile_email|default('admin@smartshelf.com') }}</p>
          </div>
          <div class="avatar">{{ profile_initials|default('A') }}</div>
        </div>
      </header>

      <section class="content">
        {% block content %}{% endblock %}
      </section>
    </main>
  </div>

  {% block scripts %}{% endblock %}
</body>
</html>
