{% extends "base.html" %}
{% set active_page = "add_product" %}

{% block title %}Add Product - Smart Shelf{% endblock %}

{% block content %}
  <a class="back-link" href="/inventory-page">&lt; Back to Inventory</a>
  <h1>Add New Product</h1>
  <p class="subtitle">Enter product details to add to your inventory</p>

  <div class="panel form-panel">
    <form method="POST">
      <div class="form-grid">
        <div class="full">
          <label for="name">Product Name *</label>
          <input id="name" type="text" name="name" placeholder="e.g., Organic Milk" required>
        </div>

        <div>
          <label for="category">Category *</label>
          <select id="category" name="category" required>
            <option value="">Select a category</option>
            <option>Dairy</option>
            <option>Bakery</option>
            <option>Beverages</option>
            <option>Produce</option>
            <option>Pantry</option>
          </select>
        </div>

        <div>
          <label for="quantity">Quantity *</label>
          <input id="quantity" type="number" name="quantity" min="0" placeholder="0" required>
        </div>

        <div>
          <label for="expiry_date">Expiry Date *</label>
          <input id="expiry_date" type="date" name="expiry_date" required>
        </div>

        <div>
          <label for="supplier">Supplier *</label>
          <input id="supplier" type="text" name="supplier" placeholder="e.g., Fresh Farms Co." required>
        </div>

        <div>
          <label for="unit_price">Selling Price ($) *</label>
          <input id="unit_price" type="number" step="0.01" name="unit_price" placeholder="0.00" required>
        </div>

        <div>
          <label for="reorder_level">Reorder Level *</label>
          <input id="reorder_level" type="number" name="reorder_level" min="0" placeholder="10" required>
        </div>

        <div class="full actions">
          <button class="btn btn-primary" type="submit">Save Product</button>
          <a class="btn btn-secondary" href="/inventory-page">Cancel</a>
        </div>
      </div>
    </form>
  </div>
{% endblock %}
