<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Shelf - Admin Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 flex flex-col justify-center items-center min-h-screen relative font-sans">

    <a href="/" class="absolute top-8 left-8 flex items-center text-gray-600 hover:text-gray-900 text-sm gap-2 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
        </svg>
        Back to role selection
    </a>

    <div class="flex flex-col items-center mb-6">
        <img src="{{ url_for('static', filename='images/logo.png') }}" class="w-20 h-13 mb-1" alt="Smart Shelf Logo">
        </div>
        <h1 class="text-2xl font-bold text-gray-900 tracking-tight">Smart Shelf</h1>
        <div class="flex items-center text-sm text-gray-500 gap-1.5 mt-1">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4 text-blue-600">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z" />
            </svg>
            Admin Login
        </div>
    </div>

    <div class="bg-white p-8 mt-6 rounded-2xl shadow-xs border border-gray-100 w-full max-w-md mx-4">
        
        {% if error %}
        <div class="bg-red-50 text-red-600 border border-red-100 rounded-xl p-3 text-sm text-center mb-5 font-medium animate-pulse">
            {{ error }}
        </div>
        {% endif %}

        <form action="/login/admin" method="POST" class="space-y-4">
            <div>
                <label for="email" class="block text-sm font-semibold text-gray-700 mb-1">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="admin@example.com"
                    class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all text-sm">
            </div>

            <div>
                <label for="password" class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter your password"
                    class="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all text-sm">
            </div>

            <button type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-xl text-sm transition-all shadow-sm hover:shadow-md cursor-pointer mt-2">
                Login as Admin
            </button>
        </form>

        <div class="text-center mt-5">
            <a href="#" class="text-sm font-medium text-blue-600 hover:text-blue-700 transition-colors">Forgot password?</a>
        </div>
    </div>

</body>
</html>
