{% extends "base.html" %}

{% block title %}Sales{% endblock %}

{% block content %}
<h2 style="font-weight: 700;">Sales Overview</h2>

<div class="card" style="margin-top:20px;">
    <h3>Total Sales</h3>
    <p style="font-size: 28px; font-weight: 700;">₹{{ total_sales }}</p>
</div>

<div class="card" style="margin-top:20px;">
    <h3>Sales Records</h3>
    <ul>
        {% for sale in sales_records %}
            <li>₹{{ sale }}</li>
        {% endfor %}
    </ul>
</div>
{% endblock %}
