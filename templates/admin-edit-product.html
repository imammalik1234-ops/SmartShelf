{% extends "admin-base.html" %}

{% block title %}Edit Product - Smart Shelf{% endblock %}

{% block content %}
<div class="admin-dashboard-page">
    <div class="dashboard-header-row">
        <div>
            <h1 class="dashboard-title">Edit Product</h1>
            <p class="dashboard-subtitle">Update product details and inventory quantity.</p>
        </div>
    </div>

    <div class="admin-panel">
        {% if errors %}
        <div class="message error validation-summary">
            {% for error in errors %}
                <div>{{ error }}</div>
            {% endfor %}
        </div>
        {% endif %}

        <form method="POST" class="admin-edit-form">
            <div class="admin-form-grid">
                <div class="admin-form-group">
                    <label for="name">Product Name</label>
                    <input type="text" id="name" name="name" value="{{ product.name }}" required>
                </div>

                <div class="admin-form-group">
                    <label for="category">Category</label>
                    <input type="text" id="category" name="category" value="{{ product.category }}" required>
                </div>

                <div class="admin-form-group">
                    <label for="supplier">Brand</label>
                    <input type="text" id="supplier" name="supplier" value="{{ product.supplier }}" required>
                </div>

                <div class="admin-form-group">
                    <label for="unit_price">Unit Price</label>
                    <input type="number" step="0.01" id="unit_price" name="unit_price" value="{{ product.unit_price }}" required>
                </div>

                <div class="admin-form-group">
                    <label for="expiry_date">Expiry Date</label>
                    <input
                        type="date"
                        id="expiry_date"
                        name="expiry_date"
                        value="{{ product.expiry_date.strftime('%Y-%m-%d') if product.expiry_date else '' }}"
                        required
                    >
                </div>

                <div class="admin-form-group">
                    <label for="reorder_level">Restock Level</label>
                    <input type="number" id="reorder_level" name="reorder_level" value="{{ product.reorder_level }}" required>
                </div>

                <div class="admin-form-group">
                    <label for="quantity">Quantity</label>
                    <input
                        type="number"
                        id="quantity"
                        name="quantity"
                        value="{{ inventory.quantity if inventory else 0 }}"
                        min="0"
                        required
                    >
                </div>
            </div>

            <div class="admin-form-actions">
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <a href="/admin-inventory" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
