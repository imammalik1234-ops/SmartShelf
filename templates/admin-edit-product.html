{% extends "admin-base.html" %}

{% block title %}Edit Product{% endblock %}

{% block content %}

<div class="edit-header">
    <div>
        <h1>Edit Product</h1>
        <p>Update product information and inventory details.</p>
    </div>
</div>

<div class="edit-card">

    <form>

        <div class="form-grid">

     <div class="form-group">
    <label>Product Name</label>
    <input type="text"
           name="name"
           value="{{ product.name }}">
</div>

            <div class="form-group">
    <label>Category</label>
    <input type="text"
           name="category"
           value="{{ product.category }}">
</div>

            <div class="form-group">
                <label>Quantity</label>
                <input type="number" placeholder="Enter quantity">
            </div>

            <div class="form-group">
    <label>Supplier</label>
    <input type="text"
           name="supplier"
           value="{{ product.supplier }}">
</div>

          <div class="form-group">
    <label>Expiry Date</label>
    <input type="date"
           name="expiry_date"
           value="{{ product.expiry_date }}">
</div>

        </div>

        <div class="button-group">
            <button type="button" class="cancel-btn">
                Cancel
            </button>

            <button type="submit" class="save-btn">
                Save Changes
            </button>
        </div>

    </form>

</div>

<style>

.edit-header{
    margin-bottom:30px;
}

.edit-header h1{
    font-size:2.5rem;
    margin:0;
}

.edit-header p{
    color:#6b7280;
    margin-top:8px;
}

.edit-card{
    background:white;
    border-radius:20px;
    padding:40px;
    box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.form-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:24px;
}

.form-group{
    display:flex;
    flex-direction:column;
}

.form-group label{
    font-weight:600;
    margin-bottom:8px;
}

.form-group input{
    padding:14px;
    border:1px solid #d1d5db;
    border-radius:12px;
    font-size:1rem;
}

.button-group{
    margin-top:40px;
    display:flex;
    justify-content:flex-end;
    gap:16px;
}

.cancel-btn{
    padding:12px 24px;
    border:none;
    border-radius:12px;
    background:#e5e7eb;
    cursor:pointer;
}

.save-btn{
    padding:12px 24px;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

</style>

{% endblock %}
