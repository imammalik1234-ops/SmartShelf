<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Product - Smart Shelf</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/smartshelf.css') }}">
</head>

<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div>
        <div class="brand">
          <div class="logo">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Smart Shelf Logo">
          </div>
          <div>
            <h2>Smart Shelf</h2>
            <p>Staff Portal</p>
          </div>
        </div>

        <nav class="nav">
          <a href="/dashboard"><span class="nav-icon">D</span> Dashboard</a>
          <a class="active" href="/inventory-page"><span class="nav-icon">I</span> Inventory</a>
          <a href="/add-product"><span class="nav-icon">+</span> Add Product</a>
          <a href="/record-sale"><span class="nav-icon">S</span> Record Sale</a>
          <a href="/expiry-alerts"><span class="nav-icon">!</span> Expiry Alerts</a>
        </nav>
      </div>

      <a class="logout" href="#">Logout</a>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="search">
          <span></span>
          <input type="search" placeholder="Search inventory...">
        </div>
        <div class="profile">
          <div>
            <h4>Staff Member</h4>
            <p>staff@example.com</p>
          </div>
          <div class="avatar">SM</div>
        </div>
      </header>

      <section class="content">
        <a class="back-link" href="/inventory-page">&lt; Back to Inventory</a>
        <h1>Edit Product</h1>
        <p class="subtitle">Update product details and current stock quantity</p>

        <div class="panel form-panel">
          <form method="POST">
            <div class="form-grid">
              <div class="full">
                <label for="name">Product Name *</label>
                <input id="name" type="text" name="name" value="{{ product.name }}" required>
              </div>

              <div>
                <label for="category">Category *</label>
                <select id="category" name="category" required>
                  {% for category in ['Dairy', 'Bakery', 'Beverages', 'Produce', 'Pantry'] %}
                    <option value="{{ category }}" {% if product.category == category %}selected{% endif %}>{{ category }}</option>
                  {% endfor %}
                  {% if product.category not in ['Dairy', 'Bakery', 'Beverages', 'Produce', 'Pantry'] %}
                    <option value="{{ product.category }}" selected>{{ product.category }}</option>
                  {% endif %}
                </select>
              </div>

              <div>
                <label for="quantity">Quantity *</label>
                <input id="quantity" type="number" name="quantity" min="0" value="{{ quantity }}" required>
              </div>

              <div>
                <label for="expiry_date">Expiry Date *</label>
                <input id="expiry_date" type="date" name="expiry_date" value="{{ product.expiry_date }}" required>
              </div>

              <div>
                <label for="supplier">Supplier *</label>
                <input id="supplier" type="text" name="supplier" value="{{ product.supplier }}" required>
              </div>

              <div>
                <label for="unit_price">Selling Price ($) *</label>
                <input id="unit_price" type="number" step="0.01" name="unit_price" value="{{ product.unit_price }}" required>
              </div>

              <div>
                <label for="reorder_level">Reorder Level *</label>
                <input id="reorder_level" type="number" name="reorder_level" min="0" value="{{ product.reorder_level }}" required>
              </div>

              <div class="full actions">
                <button class="btn btn-primary" type="submit">Update Product</button>
                <a class="btn btn-secondary" href="/inventory-page" style="display:flex;align-items:center;justify-content:center;">Cancel</a>
              </div>
            </div>
          </form>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
